name: Deploy physicsforge-chapter2 to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_BASE_PATH: /physicsforge-chapter2/

      - name: Publish to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:refs/remotes/origin/gh-pages --depth=1
          git worktree add gh-pages-worktree origin/gh-pages
          find gh-pages-worktree -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. gh-pages-worktree/
          touch gh-pages-worktree/.nojekyll
          cd gh-pages-worktree
          git add -A
          git commit -m "Deploy physicsforge-chapter2 site" || exit 0
          git push origin HEAD:gh-pages
